name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: quant_engine/requirements.txt
      - name: Install Python dependencies
        run: python -m pip install -r quant_engine/requirements.txt
      - name: Install
        run: npm ci
      - name: Security audit (via audit-ci)
        run: npx --yes audit-ci@^7 --config .audit-ci.jsonc --production
      - name: Typecheck, test, build
        run: npm run ci

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - name: Install
        run: npm ci
      - name: Audit production dependencies (audit-ci moderate+)
        run: npx --yes audit-ci@^7 --config .audit-ci.jsonc --production
